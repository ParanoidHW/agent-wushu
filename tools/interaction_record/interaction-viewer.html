<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interaction Record Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d14;
      --panel: #101722;
      --text: #d8e2ee;
      --muted: #8795a7;
      --line: #263343;
      --line-strong: #35465a;
      --user: #102a43;
      --agent: #123226;
      --notes: #382f16;
      --accent: #45d6c8;
      --accent-strong: #7df5ea;
      --shadow: none;
      --page-width: 80%;
    }

    body[data-bg="gold"] {
      color-scheme: light;
      --bg: #f5edd7;
      --panel: #fff8e8;
      --text: #2f2a1f;
      --muted: #766b56;
      --line: #d8caa8;
      --line-strong: #bda977;
      --user: #f3e5c4;
      --agent: #ecdfbd;
      --notes: #ead9ab;
      --accent: #8d6b1f;
      --accent-strong: #5d4716;
    }

    * {
      box-sizing: border-box;
    }

    ::selection {
      background: rgba(69, 214, 200, 0.28);
    }

    body {
      margin: 0;
      background:
        linear-gradient(var(--grid-line, rgba(69, 214, 200, 0.03)) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line, rgba(69, 214, 200, 0.03)) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(16, 23, 34, 0.94);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    body[data-bg="gold"] {
      --grid-line: rgba(141, 107, 31, 0.06);
    }

    body[data-bg="gold"] header {
      background: rgba(255, 248, 232, 0.94);
    }

    .wrap {
      width: min(var(--page-width), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 72px;
      padding: 14px 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    a {
      color: var(--accent-strong);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .file-input {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      background: rgba(69, 214, 200, 0.12);
      color: var(--accent-strong);
      font-weight: 650;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .file-input:hover {
      background: rgba(69, 214, 200, 0.2);
      border-color: var(--accent-strong);
    }

    .file-input input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #0d131c;
      color: var(--text);
      font: inherit;
      font-weight: 620;
      padding: 0 12px;
      cursor: pointer;
    }

    body[data-bg="gold"] button,
    body[data-bg="gold"] .toggle {
      background: #fbf1d9;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #0d131c;
      color: var(--text);
      font-weight: 620;
      padding: 0 12px;
      white-space: nowrap;
      cursor: pointer;
    }

    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #0d131c;
      color: var(--text);
      font: inherit;
      font-weight: 620;
      padding: 0 10px;
      cursor: pointer;
    }

    select:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    body[data-bg="gold"] select {
      background: #fbf1d9;
    }

    .toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    main {
      padding: 24px 0 42px;
    }

    .drop-overlay {
      position: fixed;
      inset: 18px;
      z-index: 20;
      display: grid;
      place-items: center;
      border: 2px dashed var(--accent);
      border-radius: 6px;
      background: rgba(9, 13, 20, 0.9);
      color: var(--accent-strong);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-weight: 760;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    body[data-bg="gold"] .drop-overlay {
      background: rgba(245, 237, 215, 0.9);
    }

    body.drop-active .drop-overlay {
      opacity: 1;
    }

    .notice {
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      color: var(--muted);
    }

    .notice strong {
      color: var(--text);
    }

    .notice code {
      color: var(--accent-strong);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .meta-item {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(16, 23, 34, 0.86);
      padding: 10px 12px;
    }

    body[data-bg="gold"] .meta-item {
      background: #fbf0d3;
    }

    .meta-key {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .meta-value {
      margin-top: 2px;
      overflow-wrap: anywhere;
      font-weight: 620;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 12px 0 16px;
      color: var(--muted);
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .turn-list {
      display: grid;
      gap: 14px;
    }

    details.turn {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    details.turn[open] {
      border-color: var(--line-strong);
    }

    details.turn summary {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      list-style: none;
      min-height: 58px;
      background: linear-gradient(90deg, rgba(69, 214, 200, 0.08), transparent 42%);
    }

    body[data-bg="gold"] details.turn summary {
      background: linear-gradient(90deg, rgba(141, 107, 31, 0.09), transparent 42%);
    }

    details.turn summary::-webkit-details-marker {
      display: none;
    }

    .chevron {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: var(--accent);
      border: 1px solid var(--line-strong);
      font-size: 14px;
      transition: transform 0.15s ease;
    }

    details[open] .chevron {
      transform: rotate(90deg);
    }

    .turn-title {
      min-width: 0;
      font-weight: 760;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .turn-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .turn-body {
      border-top: 1px solid var(--line);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
      background: #0d131c;
    }

    body[data-bg="gold"] .section {
      background: #f8ecd0;
    }

    .section h3 {
      margin: 0;
      padding: 8px 12px;
      font-size: 14px;
      letter-spacing: 0;
      border-bottom: 1px solid var(--line);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .section.user h3 {
      background: var(--user);
      color: #a8d8ff;
    }

    body[data-bg="gold"] .section.user h3 {
      color: #514018;
    }

    .section.agent h3 {
      background: var(--agent);
      color: #a8f0c8;
    }

    body[data-bg="gold"] .section.agent h3 {
      color: #443912;
    }

    .section.notes h3,
    .section.tags h3 {
      background: var(--notes);
      color: #f3d38a;
    }

    body[data-bg="gold"] .section.notes h3,
    body[data-bg="gold"] .section.tags h3 {
      color: #4a3910;
    }

    .content {
      padding: 12px;
      overflow-wrap: anywhere;
      background: rgba(9, 13, 20, 0.34);
    }

    body[data-bg="gold"] .content {
      background: rgba(255, 250, 238, 0.58);
    }

    .content > :first-child {
      margin-top: 0;
    }

    .content > :last-child {
      margin-bottom: 0;
    }

    pre {
      max-width: 100%;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #05080d;
      color: #d8e2ee;
    }

    body[data-bg="gold"] pre {
      background: #2a2419;
      color: #f7ecd1;
    }

    pre::-webkit-scrollbar,
    .mermaid::-webkit-scrollbar,
    table::-webkit-scrollbar {
      height: 10px;
    }

    pre::-webkit-scrollbar-thumb,
    .mermaid::-webkit-scrollbar-thumb,
    table::-webkit-scrollbar-thumb {
      background: var(--line-strong);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.94em;
    }

    .mermaid {
      max-width: 100%;
      overflow-x: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #0d131c;
      text-align: center;
    }

    body[data-bg="gold"] .mermaid {
      background: #fbf0d3;
    }

    .MathJax_Display,
    mjx-container[display="true"] {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding: 4px 0;
    }

    .math-block {
      max-width: 100%;
      overflow-x: auto;
      padding: 4px 0;
    }

    :not(pre) > code {
      padding: 0.1em 0.25em;
      border-radius: 3px;
      background: #172232;
      color: var(--accent-strong);
    }

    body[data-bg="gold"] :not(pre) > code {
      background: #eadbb9;
    }

    blockquote {
      margin: 0;
      padding: 0 0 0 12px;
      border-left: 3px solid var(--accent);
      color: #aab8c8;
    }

    body[data-bg="gold"] blockquote {
      color: #62553d;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #121c29;
      color: var(--accent-strong);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    body[data-bg="gold"] th {
      background: #eadbb9;
    }

    td {
      background: rgba(13, 19, 28, 0.72);
    }

    body[data-bg="gold"] td {
      background: rgba(255, 250, 238, 0.62);
    }

    .empty {
      padding: 32px 20px;
      border: 1px dashed var(--line-strong);
      border-radius: 4px;
      text-align: center;
      color: var(--muted);
      background: rgba(16, 23, 34, 0.66);
    }

    body[data-bg="gold"] .empty {
      background: rgba(255, 248, 232, 0.62);
    }

    .error {
      border-color: rgba(255, 107, 122, 0.7);
      background: rgba(255, 107, 122, 0.08);
      color: #ffc2c8;
    }

    @media (max-width: 720px) {
      .wrap {
        width: calc(100% - 20px);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: stretch;
      }

      .actions > * {
        flex: 1 1 auto;
        justify-content: center;
      }

      details.turn summary {
        grid-template-columns: auto 1fr;
      }

      .turn-count {
        grid-column: 2;
      }
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true
      },
      svg: {
        fontCache: "global"
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script type="module">
    window.mermaidReady = import("https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs")
      .then((module) => {
        const mermaid = module.default;
        mermaid.initialize({
          startOnLoad: false,
          securityLevel: "strict",
          theme: "default"
        });
        window.mermaid = mermaid;
        return mermaid;
      })
      .catch((error) => {
        console.warn("Mermaid failed to load:", error);
        return null;
      });
  </script>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1 id="pageTitle">Interaction Record Viewer</h1>
        <p class="subtitle" id="pageSubtitle">导入符合 spec 的 Markdown 文件，按轮次折叠查看用户和 Agent 的交互。</p>
      </div>
      <div class="actions">
        <button id="openFileHandle" type="button">打开并记住</button>
        <label class="file-input">
          导入 Markdown
          <input id="fileInput" type="file" accept=".md,.markdown,text/markdown,text/plain">
        </label>
        <button id="restoreLast" type="button" hidden>恢复上次文件</button>
        <label class="toggle" title="文件内容变化后自动重新渲染">
          <input id="autoRefresh" type="checkbox" checked>
          自动刷新
        </label>
        <label class="toggle" title="隐藏由 PreToolUse hook 写入的工具调用记录">
          <input id="ignorePreToolUse" type="checkbox" checked>
          忽略 PreToolUse
        </label>
        <button id="refreshNow" type="button" disabled>刷新</button>
        <select id="backgroundTheme" aria-label="背景颜色">
          <option value="dark">深色技术</option>
          <option value="gold">浅金色</option>
        </select>
        <button id="expandAll" type="button">全部展开</button>
        <button id="collapseAll" type="button">全部折叠</button>
      </div>
    </div>
  </header>

  <div id="dropOverlay" class="drop-overlay">拖入 Markdown 文件以加载</div>

  <main class="wrap">
    <section id="message" class="notice">
      <strong>等待导入。</strong> 请选择或拖入按 <code>interaction-record-spec.md</code> 编写的 Markdown 交互记录。
    </section>
    <section id="meta" class="meta" hidden></section>
    <div class="toolbar">
      <span id="summary">尚未加载记录</span>
      <span id="fileName"></span>
    </div>
    <section id="turnList" class="turn-list">
      <div class="empty">导入文件后，每条交互记录会显示为一个可单独折叠和展开的区块。</div>
    </section>
  </main>

  <script>
    const fileInput = document.querySelector("#fileInput");
    const message = document.querySelector("#message");
    const metaEl = document.querySelector("#meta");
    const turnList = document.querySelector("#turnList");
    const summaryEl = document.querySelector("#summary");
    const fileNameEl = document.querySelector("#fileName");
    const pageTitle = document.querySelector("#pageTitle");
    const pageSubtitle = document.querySelector("#pageSubtitle");
    const openFileHandle = document.querySelector("#openFileHandle");
    const restoreLast = document.querySelector("#restoreLast");
    const autoRefresh = document.querySelector("#autoRefresh");
    const ignorePreToolUse = document.querySelector("#ignorePreToolUse");
    const refreshNow = document.querySelector("#refreshNow");
    const backgroundTheme = document.querySelector("#backgroundTheme");
    const expandAll = document.querySelector("#expandAll");
    const collapseAll = document.querySelector("#collapseAll");
    const AUTO_REFRESH_MS = 2000;
    const DB_NAME = "interaction-record-viewer";
    const DB_STORE = "file-handles";
    const DB_KEY = "last-file";
    const THEME_KEY = "interaction-viewer-background";
    const IGNORE_PRETOOLUSE_KEY = "interaction-viewer-ignore-pretooluse";
    let currentSource = null;
    let currentRecord = null;
    let refreshTimer = null;
    let droppedDepth = 0;

    openFileHandle.addEventListener("click", async () => {
      await openRememberedFile();
    });

    restoreLast.addEventListener("click", async () => {
      await restoreLastFile({ requestPermission: true });
    });

    backgroundTheme.addEventListener("change", () => {
      applyBackgroundTheme(backgroundTheme.value, { persist: true });
    });

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      await loadFileSource({
        kind: "snapshot",
        file,
        name: file.name,
        canReadFresh: false,
        source: "picker"
      });
    });

    autoRefresh.addEventListener("change", () => {
      updateRefreshControls();
      if (autoRefresh.checked) {
        startAutoRefresh();
      } else {
        stopAutoRefresh();
      }
    });

    ignorePreToolUse.addEventListener("change", () => {
      localStorage.setItem(IGNORE_PRETOOLUSE_KEY, String(ignorePreToolUse.checked));
      renderCurrentRecord({ filtered: true });
    });

    refreshNow.addEventListener("click", async () => {
      await refreshCurrentFile({ force: true });
    });

    window.addEventListener("dragenter", (event) => {
      if (!hasDraggedFiles(event)) return;
      event.preventDefault();
      droppedDepth += 1;
      document.body.classList.add("drop-active");
    });

    window.addEventListener("dragover", (event) => {
      if (!hasDraggedFiles(event)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "copy";
    });

    window.addEventListener("dragleave", (event) => {
      if (!hasDraggedFiles(event)) return;
      droppedDepth = Math.max(0, droppedDepth - 1);
      if (droppedDepth === 0) {
        document.body.classList.remove("drop-active");
      }
    });

    window.addEventListener("drop", async (event) => {
      if (!hasDraggedFiles(event)) return;
      event.preventDefault();
      droppedDepth = 0;
      document.body.classList.remove("drop-active");
      const source = await getDropSource(event);
      if (!source) return;
      await loadFileSource(source);
    });

    window.addEventListener("beforeunload", () => {
      stopAutoRefresh();
    });

    window.addEventListener("load", async () => {
      initializeBackgroundTheme();
      initializePreToolUseFilter();
      await initializePersistentFileControls();
      renderEnhancements();
    });

    function initializeBackgroundTheme() {
      const saved = localStorage.getItem(THEME_KEY) || "dark";
      applyBackgroundTheme(saved, { persist: false });
    }

    function applyBackgroundTheme(value, { persist }) {
      const theme = value === "gold" ? "gold" : "dark";
      document.body.dataset.bg = theme;
      backgroundTheme.value = theme;
      if (persist) {
        localStorage.setItem(THEME_KEY, theme);
      }
    }

    function initializePreToolUseFilter() {
      const saved = localStorage.getItem(IGNORE_PRETOOLUSE_KEY);
      ignorePreToolUse.checked = saved === null || saved === "true";
    }

    async function openRememberedFile() {
      if (!("showOpenFilePicker" in window)) {
        renderNotice("当前浏览器不支持持久文件句柄。请拖入文件，或使用“导入 Markdown”。");
        return;
      }

      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "Markdown",
            accept: {
              "text/markdown": [".md", ".markdown"],
              "text/plain": [".txt"]
            }
          }]
        });
        await loadFileSource({
          kind: "handle",
          handle,
          name: handle.name,
          canReadFresh: true,
          source: "picker"
        });
      } catch (error) {
        if (error.name !== "AbortError") {
          renderError(error.message || String(error));
        }
      }
    }

    async function initializePersistentFileControls() {
      if (!supportsPersistentHandles()) {
        openFileHandle.disabled = true;
        openFileHandle.title = "当前浏览器不支持刷新后恢复文件";
        return;
      }
      if (!("showOpenFilePicker" in window)) {
        openFileHandle.disabled = true;
        openFileHandle.title = "当前浏览器不支持通过按钮打开并记住文件；可尝试拖入文件";
      }

      const handle = await loadLastHandle();
      restoreLast.hidden = !handle;
      if (!handle) return;
      await restoreLastFile({ requestPermission: false });
    }

    async function restoreLastFile({ requestPermission }) {
      const handle = await loadLastHandle();
      if (!handle) {
        restoreLast.hidden = true;
        return;
      }

      const permission = await getHandlePermission(handle, requestPermission);
      if (permission !== "granted") {
        restoreLast.hidden = false;
        renderNotice("已找到上次文件。点击“恢复上次文件”授权后，可在浏览器刷新后继续读取最新内容。");
        return;
      }

      restoreLast.hidden = true;
      await loadFileSource({
        kind: "handle",
        handle,
        name: handle.name,
        canReadFresh: true,
        source: "restore"
      });
    }

    async function loadFileSource(source) {
      try {
        const file = await readSourceFile(source);
        const text = await file.text();
        const record = parseInteractionRecord(text);
        currentRecord = record;
        currentSource = {
          ...source,
          name: source.name || file.name,
          stamp: getFileStamp(file)
        };
        if (source.kind === "handle") {
          await rememberHandle(source.handle);
          restoreLast.hidden = true;
        }
        renderRecord(record, file.name, {
          source: source.source,
          refreshed: false,
          timestamp: new Date()
        });
        updateRefreshControls();
        if (autoRefresh.checked) {
          startAutoRefresh();
        }
      } catch (error) {
        renderError(error.message || String(error));
        currentRecord = null;
        currentSource = null;
        updateRefreshControls();
      }
    }

    async function refreshCurrentFile({ force = false } = {}) {
      if (!currentSource) return;
      try {
        const file = await readSourceFile(currentSource);
        const nextStamp = getFileStamp(file);
        if (!force && nextStamp === currentSource.stamp) {
          updateRefreshStatus("未检测到变化", new Date());
          return;
        }

        const text = await file.text();
        const record = parseInteractionRecord(text);
        currentRecord = record;
        currentSource.stamp = nextStamp;
        renderRecord(record, currentSource.name, {
          source: "refresh",
          refreshed: true,
          timestamp: new Date()
        });
      } catch (error) {
        renderError(error.message || String(error));
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      if (!currentSource || !autoRefresh.checked || !currentSource.canReadFresh) return;
      refreshTimer = window.setInterval(() => {
        refreshCurrentFile();
      }, AUTO_REFRESH_MS);
    }

    function stopAutoRefresh() {
      if (refreshTimer) {
        window.clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    function updateRefreshControls() {
      refreshNow.disabled = !currentSource;
      if (!currentSource) {
        stopAutoRefresh();
        fileNameEl.textContent = "";
        return;
      }
      if (!currentSource.canReadFresh) {
        stopAutoRefresh();
      }
      if (autoRefresh.checked && currentSource.canReadFresh && !refreshTimer) {
        startAutoRefresh();
      }
    }

    function updateRefreshStatus(label, timestamp) {
      if (!currentSource) return;
      fileNameEl.textContent = `${currentSource.name} · ${label} ${formatTime(timestamp)}`;
    }

    async function readSourceFile(source) {
      if (source.kind === "handle") {
        return source.handle.getFile();
      }
      return source.file;
    }

    async function getDropSource(event) {
      const item = Array.from(event.dataTransfer.items || []).find((candidate) => candidate.kind === "file");
      if (item && typeof item.getAsFileSystemHandle === "function") {
        try {
          const handle = await item.getAsFileSystemHandle();
          if (handle && handle.kind === "file") {
            return {
              kind: "handle",
              handle,
              name: handle.name,
              canReadFresh: true,
              source: "drop"
            };
          }
        } catch (error) {
          console.warn("FileSystemHandle unavailable:", error);
        }
      }

      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      if (!file) return null;
      return {
        kind: "snapshot",
        file,
        name: file.name,
        canReadFresh: false,
        source: "drop"
      };
    }

    function getFileStamp(file) {
      return `${file.name}:${file.size}:${file.lastModified}`;
    }

    function hasDraggedFiles(event) {
      return Array.from(event.dataTransfer?.types || []).includes("Files");
    }

    function supportsPersistentHandles() {
      return "indexedDB" in window && ("showOpenFilePicker" in window || "DataTransferItem" in window);
    }

    async function getHandlePermission(handle, requestPermission) {
      const options = { mode: "read" };
      if (typeof handle.queryPermission === "function") {
        const current = await handle.queryPermission(options);
        if (current === "granted" || !requestPermission) return current;
      }
      if (requestPermission && typeof handle.requestPermission === "function") {
        return handle.requestPermission(options);
      }
      return "prompt";
    }

    async function rememberHandle(handle) {
      try {
        await saveLastHandle(handle);
      } catch (error) {
        console.warn("Failed to remember file handle:", error);
      }
    }

    async function saveLastHandle(handle) {
      if (!("indexedDB" in window)) return;
      const db = await openHandleDb();
      await idbRequest(db.transaction(DB_STORE, "readwrite").objectStore(DB_STORE).put(handle, DB_KEY));
      db.close();
    }

    async function loadLastHandle() {
      if (!("indexedDB" in window)) return null;
      try {
        const db = await openHandleDb();
        const handle = await idbRequest(db.transaction(DB_STORE, "readonly").objectStore(DB_STORE).get(DB_KEY));
        db.close();
        return handle || null;
      } catch (error) {
        console.warn("Failed to load remembered file handle:", error);
        return null;
      }
    }

    function openHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore(DB_STORE);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function idbRequest(request) {
      return new Promise((resolve, reject) => {
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function renderNotice(text) {
      message.className = "notice";
      message.innerHTML = escapeHtml(text);
    }

    function formatTime(date) {
      return date.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    expandAll.addEventListener("click", () => {
      document.querySelectorAll("details.turn").forEach((item) => {
        item.open = true;
      });
    });

    collapseAll.addEventListener("click", () => {
      document.querySelectorAll("details.turn").forEach((item) => {
        item.open = false;
      });
    });

    function parseInteractionRecord(source) {
      const normalized = source.replace(/\r\n?/g, "\n");
      const { frontMatter, body } = extractFrontMatter(normalized);
      const metadata = parseFrontMatter(frontMatter);
      const turns = parseTurns(body);

      if (turns.length === 0) {
        throw new Error("未找到任何 `## Turn` 轮次。请检查文件是否符合 interaction-record-spec.md。");
      }

      return { metadata, turns };
    }

    function renderCurrentRecord(state = {}) {
      if (!currentRecord) return;
      renderRecord(currentRecord, currentSource?.name || "Interaction Record", {
        timestamp: new Date(),
        ...state
      });
    }

    function extractFrontMatter(source) {
      if (!source.startsWith("---\n")) {
        return { frontMatter: "", body: source };
      }

      const endIndex = source.indexOf("\n---", 4);
      if (endIndex === -1) {
        return { frontMatter: "", body: source };
      }

      const afterFence = source.slice(endIndex + 4);
      if (afterFence.startsWith("\n")) {
        return {
          frontMatter: source.slice(4, endIndex),
          body: afterFence.slice(1)
        };
      }

      return {
        frontMatter: source.slice(4, endIndex),
        body: afterFence
      };
    }

    function parseFrontMatter(frontMatter) {
      const result = {};
      const stack = [{ indent: -1, object: result }];

      frontMatter.split("\n").forEach((line) => {
        if (!line.trim() || line.trim().startsWith("#")) return;
        const match = line.match(/^(\s*)([A-Za-z0-9_.-]+):\s*(.*)$/);
        if (!match) return;

        const indent = match[1].length;
        const key = match[2];
        const value = cleanYamlValue(match[3]);

        while (stack.length > 1 && indent <= stack[stack.length - 1].indent) {
          stack.pop();
        }

        const parent = stack[stack.length - 1].object;
        if (value === "") {
          parent[key] = {};
          stack.push({ indent, object: parent[key] });
        } else {
          parent[key] = value;
        }
      });

      return result;
    }

    function cleanYamlValue(value) {
      const trimmed = value.trim();
      if (
        (trimmed.startsWith("\"") && trimmed.endsWith("\"")) ||
        (trimmed.startsWith("'") && trimmed.endsWith("'"))
      ) {
        return trimmed.slice(1, -1);
      }
      return trimmed;
    }

    function parseTurns(body) {
      const lines = body.split("\n");
      const turns = [];
      let current = null;
      let activeSection = null;
      let activeLines = [];

      function finishSection() {
        if (!current || !activeSection) return;
        current.sections[activeSection] = activeLines.join("\n").trim();
        activeSection = null;
        activeLines = [];
      }

      function finishTurn() {
        finishSection();
        if (!current) return;
        current.user = current.sections.user || "";
        current.agent = current.sections.agent || "";
        current.notes = current.sections.notes || "";
        current.tags = current.sections.tags || "";
        turns.push(current);
        current = null;
      }

      for (const line of lines) {
        const turnMatch = line.match(/^##\s+Turn\s+(\d+)(?::\s*(.*))?\s*$/i);
        if (turnMatch) {
          finishTurn();
          current = {
            number: Number(turnMatch[1]),
            title: turnMatch[2] ? turnMatch[2].trim() : "",
            sections: {}
          };
          activeSection = null;
          activeLines = [];
          continue;
        }

        if (!current) continue;

        const sectionMatch = line.match(/^###\s+(User|Agent|Notes|Tags)\s*$/i);
        if (sectionMatch) {
          finishSection();
          activeSection = sectionMatch[1].toLowerCase();
          activeLines = [];
          continue;
        }

        if (activeSection) {
          activeLines.push(line);
        }
      }

      finishTurn();
      return turns;
    }

    function renderRecord(record, fileName, state = {}) {
      const visibleTurns = filterTurns(record.turns);
      const hiddenTurns = record.turns.length - visibleTurns.length;
      const title = getMetadataValue(record.metadata, "title") || "Interaction Record Viewer";
      const topic = getMetadataValue(record.metadata, "topic");
      pageTitle.textContent = title;
      pageSubtitle.textContent = topic || "导入符合 spec 的 Markdown 文件，按记录折叠查看用户、Agent、子代理与上下文压缩事件。";

      const loadedAt = formatTime(state.timestamp || new Date());
      const refreshText = currentSource?.canReadFresh
        ? `自动刷新${autoRefresh.checked ? "开启" : "关闭"}`
        : "快照模式";
      const actionText = state.filtered ? "已更新筛选" : state.refreshed ? "已刷新" : "已加载";
      fileNameEl.textContent = `${fileName} · ${actionText} ${loadedAt} · ${refreshText}`;

      message.className = "notice";
      const filterText = hiddenTurns > 0 ? `，已忽略 ${hiddenTurns} 条 PreToolUse 记录` : "";
      message.innerHTML = `<strong>${escapeHtml(actionText)}。</strong> ${escapeHtml(String(visibleTurns.length))} 条记录${escapeHtml(filterText)}，可单独折叠和展开。`;
      summaryEl.textContent = `${visibleTurns.length} 条记录${hiddenTurns > 0 ? ` · 已忽略 ${hiddenTurns}` : ""}`;

      renderMetadata(record.metadata);
      renderTurns(visibleTurns);
      renderEnhancements();
    }

    function filterTurns(turns) {
      if (!ignorePreToolUse.checked) return turns;
      return turns.filter((turn) => !isPreToolUseTurn(turn));
    }

    function isPreToolUseTurn(turn) {
      return /^\s*hook_event_name\s*:\s*pretooluse\s*$/im.test(turn.notes || "");
    }

    function renderMetadata(metadata) {
      const flat = flattenMetadata(metadata);
      metaEl.innerHTML = "";

      if (flat.length === 0) {
        metaEl.hidden = true;
        return;
      }

      flat.forEach(([key, value]) => {
        const item = document.createElement("article");
        item.className = "meta-item";
        item.innerHTML = `
          <div class="meta-key">${escapeHtml(key)}</div>
          <div class="meta-value">${escapeHtml(String(value))}</div>
        `;
        metaEl.appendChild(item);
      });
      metaEl.hidden = false;
    }

    function renderTurns(turns) {
      turnList.innerHTML = "";
      if (turns.length === 0) {
        turnList.innerHTML = '<div class="empty">当前筛选条件下没有可显示的交互记录。</div>';
        return;
      }
      turns.forEach((turn, index) => {
        const details = document.createElement("details");
        details.className = "turn";
        details.open = index === 0;

        const label = turn.title ? `Turn ${turn.number}: ${turn.title}` : `Turn ${turn.number}`;
        details.innerHTML = `
          <summary>
            <span class="chevron" aria-hidden="true">›</span>
            <span class="turn-title">${escapeHtml(label)}</span>
            <span class="turn-count">${sectionCount(turn)} sections</span>
          </summary>
          <div class="turn-body"></div>
        `;

        const body = details.querySelector(".turn-body");
        body.appendChild(renderSection("user", "User", turn.user));
        body.appendChild(renderSection("agent", "Agent", turn.agent));

        if (turn.notes) {
          body.appendChild(renderSection("notes", "Notes", turn.notes));
        }

        if (turn.tags) {
          body.appendChild(renderSection("tags", "Tags", turn.tags));
        }

        turnList.appendChild(details);
      });
    }

    function renderSection(className, title, markdown) {
      const section = document.createElement("section");
      section.className = `section ${className}`;
      section.innerHTML = `
        <h3>${escapeHtml(title)}</h3>
        <div class="content">${renderMarkdown(markdown || "_未记录内容_")}</div>
      `;
      return section;
    }

    function sectionCount(turn) {
      return ["user", "agent", "notes", "tags"].filter((key) => turn[key]).length;
    }

    function flattenMetadata(metadata, prefix = "") {
      const rows = [];
      Object.entries(metadata || {}).forEach(([key, value]) => {
        const fullKey = prefix ? `${prefix}.${key}` : key;
        if (value && typeof value === "object" && !Array.isArray(value)) {
          rows.push(...flattenMetadata(value, fullKey));
        } else {
          rows.push([fullKey, value]);
        }
      });
      return rows;
    }

    function getMetadataValue(metadata, key) {
      if (!metadata) return "";
      if (metadata[key]) return metadata[key];
      return key.split(".").reduce((value, part) => {
        if (!value || typeof value !== "object") return "";
        return value[part] || "";
      }, metadata);
    }

    function renderMarkdown(markdown) {
      const placeholders = [];
      const mathPlaceholders = [];
      let text = escapeHtml(markdown || "");

      text = text.replace(/```([A-Za-z0-9_-]+)?[ \t]*\n?([\s\S]*?)```/g, (_, language, code) => {
        const token = `@@CODE_${placeholders.length}@@`;
        const normalizedLanguage = String(language || "").trim().toLowerCase();
        const cleanCode = code.replace(/^\n|\n$/g, "");
        if (normalizedLanguage === "mermaid") {
          placeholders.push(`<div class="mermaid">${cleanCode}</div>`);
        } else {
          const languageClass = normalizedLanguage ? ` class="language-${escapeHtml(normalizedLanguage)}"` : "";
          placeholders.push(`<pre><code${languageClass}>${cleanCode}</code></pre>`);
        }
        return token;
      });

      text = protectMath(text, mathPlaceholders);
      text = renderTables(text);
      text = text.replace(/^######\s+(.+)$/gm, "<h6>$1</h6>");
      text = text.replace(/^#####\s+(.+)$/gm, "<h5>$1</h5>");
      text = text.replace(/^####\s+(.+)$/gm, "<h4>$1</h4>");
      text = text.replace(/^###\s+(.+)$/gm, "<h3>$1</h3>");
      text = text.replace(/^##\s+(.+)$/gm, "<h2>$1</h2>");
      text = text.replace(/^#\s+(.+)$/gm, "<h1>$1</h1>");
      text = text.replace(/^&gt;\s?(.+)$/gm, "<blockquote>$1</blockquote>");
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      text = renderLists(text);
      text = renderParagraphs(text);

      mathPlaceholders.forEach((html, index) => {
        text = text.replace(`@@MATH_${index}@@`, () => html);
      });

      placeholders.forEach((html, index) => {
        text = text.replace(`@@CODE_${index}@@`, () => html);
      });

      return text;
    }

    function protectMath(text, mathPlaceholders) {
      text = text.replace(/\$\$([\s\S]*?)\$\$/g, (match) => {
        const token = `@@MATH_${mathPlaceholders.length}@@`;
        mathPlaceholders.push(`<div class="math-block">${match}</div>`);
        return token;
      });

      text = text.replace(/\\\[([\s\S]*?)\\\]/g, (match) => {
        const token = `@@MATH_${mathPlaceholders.length}@@`;
        mathPlaceholders.push(`<div class="math-block">${match}</div>`);
        return token;
      });

      text = text.replace(/\\\(([\s\S]*?)\\\)/g, (match) => {
        const token = `@@MATH_${mathPlaceholders.length}@@`;
        mathPlaceholders.push(match);
        return token;
      });

      text = text.replace(/(^|[^\\$])\$([^\n$]+?)\$/g, (_, prefix, formula) => {
        const token = `@@MATH_${mathPlaceholders.length}@@`;
        mathPlaceholders.push(`$${formula}$`);
        return `${prefix}${token}`;
      });

      return text;
    }

    async function renderEnhancements() {
      await renderMermaidDiagrams();
      renderMath();
    }

    async function renderMermaidDiagrams() {
      if (!window.mermaid && window.mermaidReady) {
        await window.mermaidReady;
      }
      if (!window.mermaid) return;
      const diagrams = Array.from(document.querySelectorAll(".mermaid"));
      diagrams.forEach((diagram, index) => {
        if (!diagram.id) {
          diagram.id = `mermaid-${Date.now()}-${index}`;
        }
        diagram.removeAttribute("data-processed");
      });

      try {
        await window.mermaid.run({ nodes: diagrams });
      } catch (error) {
        console.warn("Mermaid render failed:", error);
      }
    }

    function renderMath() {
      if (!window.MathJax || !window.MathJax.typesetPromise) return;
      window.MathJax.typesetClear && window.MathJax.typesetClear([turnList]);
      window.MathJax.typesetPromise([turnList]).catch((error) => {
        console.warn("MathJax render failed:", error);
      });
    }

    function renderLists(text) {
      return text.replace(/(?:^|\n)((?:[-*]\s+.+(?:\n|$))+)/g, (match, list) => {
        const items = list.trim().split("\n").map((item) => item.replace(/^[-*]\s+/, "").trim());
        return `\n<ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>\n`;
      }).replace(/(?:^|\n)((?:\d+\.\s+.+(?:\n|$))+)/g, (match, list) => {
        const items = list.trim().split("\n").map((item) => item.replace(/^\d+\.\s+/, "").trim());
        return `\n<ol>${items.map((item) => `<li>${item}</li>`).join("")}</ol>\n`;
      });
    }

    function renderParagraphs(text) {
      const blockTags = /^(<\/?(h[1-6]|ul|ol|li|pre|blockquote|table|thead|tbody|tr|th|td|div)\b|@@CODE_|@@MATH_)/;
      return text.split(/\n{2,}/).map((chunk) => {
        const trimmed = chunk.trim();
        if (!trimmed) return "";
        if (blockTags.test(trimmed)) return trimmed;
        return `<p>${trimmed.replace(/\n/g, "<br>")}</p>`;
      }).join("\n");
    }

    function renderTables(text) {
      return text.replace(/((?:^\|.+\|\n?){2,})/gm, (tableBlock) => {
        const rows = tableBlock.trim().split("\n");
        if (rows.length < 2 || !/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(rows[1])) {
          return tableBlock;
        }

        const header = splitTableRow(rows[0]);
        const bodyRows = rows.slice(2).map(splitTableRow);
        return [
          "<table>",
          "<thead><tr>",
          header.map((cell) => `<th>${cell}</th>`).join(""),
          "</tr></thead>",
          "<tbody>",
          bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join(""),
          "</tbody></table>"
        ].join("");
      });
    }

    function splitTableRow(row) {
      return row.replace(/^\||\|$/g, "").split("|").map((cell) => cell.trim());
    }

    function renderError(error) {
      message.className = "notice error";
      message.innerHTML = `<strong>导入失败。</strong> ${escapeHtml(error)}`;
      metaEl.hidden = true;
      turnList.innerHTML = '<div class="empty">请修正 Markdown 文件后重新导入。</div>';
      summaryEl.textContent = "未加载有效记录";
      fileNameEl.textContent = "";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
