# Agent Wushu Registry
# 定义所有子模块的元数据，支持按类别/标签筛选克隆

categories:
  skills:
    description: "AI Agent Skills (SKILL.md 等)"
    path: "skills"
  
  tools:
    description: "Agent Tools & Utilities"
    path: "tools"
  
  clis:
    description: "CLI Tools for Agent Interaction"
    path: "clis"
  
  frameworks:
    description: "Agent Frameworks & Libraries"
    path: "frameworks"
  
  plugins:
    description: "Agent Platform Plugins"
    path: "plugins"

# 子模块注册表
modules:
  # ========== Skills ==========
  - name: cli-anything-skill
    repo: "https://github.com/HKUDS/CLI-Anything"
    category: skills
    tags: [cli, generation, automation]
    description: "CLI-Anything: Making ALL Software Agent-Native"
    branch: main
    sparse_checkout:
      - "openclaw-skill/"
      - "codex-skill/"
      - "skills/"
  
  - name: awesome-agent-skills
    repo: "https://github.com/sindresorhus/awesome"
    category: skills
    tags: [awesome, curated]
    description: "Awesome lists curated collection"
    branch: main
    sparse_checkout:
      - "README.md"

  - name: anthropics-pptx-skill
    repo: "https://github.com/anthropics/skills"
    category: skills
    tags: [pptx, presentation, claude, anthropic]
    description: "Anthropic 官方 PPTX skill - 创建和编辑演示文稿"
    branch: main
    sparse_checkout:
      - "skills/pptx/"

  - name: nanobanana-ppt-skill
    repo: "https://github.com/op7418/NanoBanana-PPT-Skills"
    category: skills
    tags: [pptx, presentation, video, generation, kling]
    description: "NanoBanana PPT Skills - AI驱动的PPT图片和视频生成"
    branch: main

  - name: excalidraw-diagram-skill
    repo: "https://github.com/coleam00/excalidraw-diagram-skill"
    category: skills
    tags: [diagram, excalidraw, visualization, architecture]
    description: "Excalidraw Diagram Skill - 生成论证性图表的 Agent skill"

  # ========== Tools ==========
  - name: skill-converter
    repo: "local"
    category: tools
    tags: [converter, skill, cross-platform, claude, codex, opencode, cursor]
    description: "跨平台 Skill 格式转换工具 - 支持 Claude/Codex/OpenCode/Cursor 等平台互转"
    local_path: "tools/skill_converter.py"

  # ========== CLIs ==========
  - name: cli-hub
    repo: "https://github.com/HKUDS/CLI-Anything"
    category: clis
    tags: [cli, hub, registry]
    description: "CLI-Hub package manager for CLI-Anything"
    branch: main
    sparse_checkout:
      - "cli-hub/"

  # ========== Frameworks ==========
  # 待添加...

  # ========== Plugins ==========
  - name: claude-plugin
    repo: "https://github.com/HKUDS/CLI-Anything"
    category: plugins
    tags: [claude, plugin]
    description: "CLI-Anything plugin for Claude Code"
    branch: main
    sparse_checkout:
      - ".claude-plugin/"
      - "cli-anything-plugin/"

  - name: opencode-commands
    repo: "https://github.com/HKUDS/CLI-Anything"
    category: plugins
    tags: [opencode, commands]
    description: "CLI-Anything commands for OpenCode"
    branch: main
    sparse_checkout:
      - "opencode-commands/"

  - name: pi-extension
    repo: "https://github.com/HKUDS/CLI-Anything"
    category: plugins
    tags: [pi, extension]
    description: "CLI-Anything extension for Pi Coding Agent"
    branch: main
    sparse_checkout:
      - ".pi-extension/"

  - name: qoder-plugin
    repo: "https://github.com/HKUDS/CLI-Anything"
    category: plugins
    tags: [qoder, plugin]
    description: "CLI-Anything plugin for Qodercli"
    branch: main
    sparse_checkout:
      - "qoder-plugin/"

# 标签分组（用于快速筛选）
tag_groups:
  coding: [cli, generation, automation]
  platform: [claude, opencode, pi, qoder, codex]
  reference: [awesome, curated]